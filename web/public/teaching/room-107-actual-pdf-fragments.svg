<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1050" viewBox="0 0 1200 1050" role="img" aria-labelledby="title desc">
  <title id="title">The five PDF line fragments actually found near Room 107 edge e0</title>
  <desc id="desc">An exact proportional drawing of five line fragments extracted from the original PDF. Three overlap at one vertical position and two overlap at another, making two visible line locations rather than five separate walls.</desc>
  <rect width="1200" height="1050" fill="#f8fafc"/>

  <text x="70" y="72" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#111827">Actual Room 107 PDF pieces</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="24" fill="#475569">These are the 5 horizontal line pieces the code actually found near e0.</text>

  <rect x="55" y="155" width="1090" height="455" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="85" y="202" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1e293b">Pulled apart so you can see every stored piece</text>

  <text x="90" y="271" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0369a1">Piece 1</text>
  <line x1="325" y1="263" x2="855" y2="263" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round"/>

  <text x="90" y="341" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0369a1">Piece 2</text>
  <line x1="325" y1="333" x2="855" y2="333" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round"/>

  <text x="90" y="411" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0369a1">Piece 3</text>
  <line x1="325" y1="403" x2="847" y2="403" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round"/>

  <text x="90" y="501" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#a16207">Piece 4</text>
  <line x1="306" y1="493" x2="1135" y2="493" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/>

  <text x="90" y="571" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#a16207">Piece 5</text>
  <line x1="325" y1="563" x2="856" y2="563" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/>

  <text x="70" y="668" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Now place those pieces where the PDF stores them</text>

  <rect x="55" y="700" width="1090" height="265" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="85" y="755" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#a16207">Pieces 4 + 5 overlap here</text>
  <line x1="306" y1="790" x2="1135" y2="790" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <line x1="325" y1="790" x2="856" y2="790" stroke="#78350f" stroke-width="3" stroke-linecap="round"/>

  <text x="85" y="854" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0369a1">Pieces 1 + 2 + 3 overlap here</text>
  <line x1="325" y1="889" x2="855" y2="889" stroke="#0ea5e9" stroke-width="9" stroke-linecap="round"/>
  <line x1="325" y1="889" x2="855" y2="889" stroke="#075985" stroke-width="3" stroke-dasharray="16 10" stroke-linecap="round"/>

  <text x="85" y="939" font-family="Arial, sans-serif" font-size="23" fill="#334155">So: 5 stored pieces, but only 2 visible line locations.</text>

  <rect x="55" y="992" width="1090" height="1" fill="#cbd5e1"/>
  <text x="70" y="1028" font-family="Arial, sans-serif" font-size="18" fill="#64748b">Source: original architectural PDF 7372349, page 5; exact candidate spans returned for Room 107 e0.</text>
</svg>
